services:
  # The FastAPI Backend
  - type: web
    name: medcrm-backend
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false

  # The Static Frontend
  - type: web
    name: medcrm-frontend
    env: static
    buildCommand: ""
    staticPublishPath: "./frontend"

