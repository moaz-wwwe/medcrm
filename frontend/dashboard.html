<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MedCRM | My Leads</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-expand navbar-dark app-navbar">
  <div class="container-fluid">
    <span class="navbar-brand">
      <span class="brand-mark">+</span> MedCRM
      <span class="badge role-badge role-badge-rep ms-2">Sales Rep</span>
    </span>
    <div class="d-flex align-items-center gap-3">
      <span class="navbar-text" id="welcome-text"></span>
      <button class="btn btn-outline-light btn-sm" id="logout-btn">Log out</button>
    </div>
  </div>
</nav>

<main class="container-fluid px-4 py-4">

  <div class="row g-4">
    <!-- Add lead form -->
    <div class="col-lg-4">
      <div class="panel">
        <h2 class="panel-title">Add New Lead</h2>
        <p class="panel-subtitle">Leads you create are automatically assigned to you.</p>

        <form id="lead-form">
          <div class="mb-3">
            <label class="form-label">Facility / Contact Name</label>
            <input type="text" class="form-control" id="lead-name" required placeholder="e.g. Al-Noor Medical Center">
          </div>
          <div class="mb-3">
            <label class="form-label">Phone Number</label>
            <input type="text" class="form-control" id="lead-phone" required placeholder="e.g. +201234567890">
          </div>
          <div class="mb-3">
            <label class="form-label">Facility Type</label>
            <select class="form-select" id="lead-facility-type" required>
              <option value="" disabled selected>Select type…</option>
              <option>Hospital</option>
              <option>Clinic</option>
              <option>Pharmacy</option>
              <option>Diagnostic Lab</option>
              <option>Nursing Home</option>
              <option>Other</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Notes (optional)</label>
            <textarea class="form-control" id="lead-notes" rows="2" placeholder="Any context about this lead…"></textarea>
          </div>
          <button type="submit" class="btn btn-brand w-100">Add Lead</button>
        </form>
        <div id="lead-form-alert" class="alert alert-danger mt-3 py-2 d-none"></div>
      </div>
    </div>

    <!-- Lead list -->
    <div class="col-lg-8">
      <div class="panel">
        <div class="d-flex justify-content-between align-items-center mb-2">
          <div>
            <h2 class="panel-title mb-0">My Leads</h2>
            <p class="panel-subtitle mb-0">Only leads assigned to you appear here.</p>
          </div>
          <span class="badge bg-light text-dark border" id="lead-count-badge">0 leads</span>
        </div>

        <div id="leads-container" class="lead-list mt-3">
          <div class="text-muted small">Loading leads…</div>
        </div>
      </div>
    </div>
  </div>

</main>

<!-- Log Call Modal -->
<div class="modal fade" id="callModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Log Call</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <form id="call-log-form">
        <div class="modal-body">
          <input type="hidden" id="call-lead-id">
          <p class="mb-3">Logging a call for: <strong id="call-lead-name"></strong></p>

          <div class="mb-3">
            <label class="form-label">Call Result</label>
            <select class="form-select" id="call-result" required>
              <option value="" disabled selected>Select outcome…</option>
              <option>Sold</option>
              <option>Interested</option>
              <option>Follow Up Needed</option>
              <option>No Answer</option>
              <option>Rejected</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label">Sale Amount ($)</label>
            <input type="number" min="0" step="0.01" class="form-control" id="call-amount" value="0">
          </div>

          <div class="mb-3">
            <label class="form-label">Notes (optional)</label>
            <textarea class="form-control" id="call-notes" rows="2"></textarea>
          </div>

          <div id="call-form-alert" class="alert alert-danger py-2 d-none"></div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-brand">Save Call Log</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
<script>
  MedCRM.requireRole('sales_rep', 'index.html');
  MedCRM.initRepDashboard();
</script>
</body>
</html>
