<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MedCRM | Sign In</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">

  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-brand">
        <div class="auth-brand-mark">+</div>
        <div>
          <div class="auth-brand-name">MedCRM</div>
          <div class="auth-brand-sub">Medical Supplies Sales Platform</div>
        </div>
      </div>

      <h1 class="auth-title">Sign in</h1>
      <p class="auth-subtitle">Use your rep or manager credentials to continue.</p>

      <form id="login-form" novalidate>
        <div class="mb-3">
          <label for="username" class="form-label">Username</label>
          <input type="text" class="form-control" id="username" placeholder="e.g. rep1" required autocomplete="username">
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input type="password" class="form-control" id="password" placeholder="••••••••" required autocomplete="current-password">
        </div>

        <div id="login-error" class="alert alert-danger py-2 d-none" role="alert"></div>

        <button type="submit" class="btn btn-brand w-100" id="login-btn">Sign In</button>
      </form>

      <div class="auth-demo">
        <div class="auth-demo-title">Demo accounts (seeded on first run)</div>
        <div class="auth-demo-row"><span>Manager</span><code>admin / admin123</code></div>
        <div class="auth-demo-row"><span>Sales rep</span><code>rep1 / rep123</code></div>
      </div>
    </div>
  </div>

<script src="app.js"></script>
<script>
  // Page-specific logic: handle the login form and redirect by role.
  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const errorBox = document.getElementById('login-error');
    const btn = document.getElementById('login-btn');

    errorBox.classList.add('d-none');
    btn.disabled = true;
    btn.textContent = 'Signing in...';

    try {
      const result = await MedCRM.login(username, password);
      // Redirect based on role returned from the backend JWT login response.
      if (result.role === 'admin') {
        window.location.href = 'admin_dashboard.html';
      } else {
        window.location.href = 'dashboard.html';
      }
    } catch (err) {
      errorBox.textContent = err.message || 'Login failed. Check your credentials.';
      errorBox.classList.remove('d-none');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  });

  // If already logged in, skip straight to the right dashboard.
  (function redirectIfLoggedIn() {
    const session = MedCRM.getSession();
    if (session) {
      window.location.href = session.role === 'admin' ? 'admin_dashboard.html' : 'dashboard.html';
    }
  })();
</script>
</body>
</html>
