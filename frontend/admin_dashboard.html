<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MedCRM - Admin Panel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header glass-panel">
        <div>
            <h2 style="margin:0; font-size:1.25rem;">Admin Dashboard</h2>
            <p style="margin:0; font-size:0.8rem;">System Overview</p>
        </div>
        <div style="display: flex; gap: 10px;">
            <button id="triggerReportBtn" class="btn btn-secondary" style="padding: 8px 12px; font-size: 0.85rem; border-color: var(--primary); color: var(--primary);">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:4px;"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                Send Report
            </button>
            <button onclick="location.href='dashboard.html'" class="btn btn-primary" style="padding: 8px 12px; font-size: 0.85rem;">
                Back to Leads
            </button>
            <button id="logoutBtn" class="btn btn-secondary" style="padding: 8px 12px; font-size: 0.85rem;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            </button>
        </div>
    </div>

    <div class="container">
        
        <!-- Create User Section -->
        <div class="glass-panel" style="padding:20px; margin-bottom:30px;">
            <h3>Create New Rep</h3>
            <form id="createUserForm" style="display:flex; flex-wrap:wrap; gap:15px; align-items:flex-end;">
                <div class="form-group" style="margin:0; flex:1; min-width:200px;">
                    <label>Username</label>
                    <input type="text" id="newUsername" required>
                </div>
                <div class="form-group" style="margin:0; flex:1; min-width:200px;">
                    <label>Full Name</label>
                    <input type="text" id="newFullName" required>
                </div>
                <div class="form-group" style="margin:0; flex:1; min-width:200px;">
                    <label>Password</label>
                    <input type="password" id="newPassword" required>
                </div>
                <div class="form-group" style="margin:0; flex:1; min-width:150px;">
                    <label>Role</label>
                    <select id="newRole" required>
                        <option value="sales_rep">Sales Rep</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary" style="margin-bottom:2px;">Create</button>
            </form>
        </div>

        <!-- Analytics Charts -->
        <div class="glass-panel" style="margin-bottom: 30px; padding: 20px;">
            <h3 style="margin-bottom: 20px;">أداء المبيعات (Analytics)</h3>
            <div style="display: flex; gap: 20px; flex-wrap: wrap;">
                <div style="flex: 1; min-width: 300px;">
                    <canvas id="salesChart"></canvas>
                </div>
                <div style="flex: 1; min-width: 300px;">
                    <canvas id="callsChart"></canvas>
                </div>
            </div>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; margin-bottom: 15px;">
            <h3 style="margin:0;">All Company Leads</h3>
            <div style="display: flex; gap: 10px; flex-wrap: wrap; align-items: center;">
                <input type="search" id="adminSearchInput" class="input" placeholder="بحث بالاسم أو الرقم..." oninput="filterAdminLeads()" style="width:200px; padding:0.5rem; height: 38px;">
                <select id="adminLeadsFilter" class="input" style="width:180px; padding:0.5rem; height: 38px;" onchange="fetchAdminData()">
                    <option value="all">جميع العملاء (All)</option>
                    <option value="pending">عملاء لم يتم التواصل معهم (Pending)</option>
                    <option value="finished">عملاء تم الانتهاء منهم (Finished)</option>
                    <option value="followups">مكالمات اليوم (Follow-ups)</option>
                </select>
                <input type="file" id="csvFileInput" accept=".csv, .xlsx" style="display:none;">
                <button id="uploadCsvBtn" class="btn btn-secondary" style="font-size:0.85rem; height: 38px; display: flex; align-items: center; gap: 4px;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    Upload File
                </button>
                <button id="exportCsvBtn" onclick="exportAdminLeadsToCsv()" class="btn btn-secondary" style="font-size:0.85rem; height: 38px; background-color: var(--accent-green); color: white; border: none;">
                    تصدير البيانات 📥
                </button>
                <a href="template.csv" download class="btn btn-secondary" style="font-size:0.85rem; text-decoration:none; display:flex; align-items:center; height: 38px;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:4px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    Download Template
                </a>
            </div>
        </div>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Facility</th>
                        <th>Phone</th>
                        <th>Rep</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody id="adminLeadsTable">
                    <!-- Skeleton Loader -->
                    <tr>
                        <td><div class="skeleton skeleton-text short"></div></td>
                        <td><div class="skeleton skeleton-text"></div></td>
                        <td><div class="skeleton skeleton-text"></div></td>
                        <td><div class="skeleton skeleton-text short"></div></td>
                        <td><div class="skeleton skeleton-text short"></div></td>
                        <td><div class="skeleton skeleton-text"></div></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Call Logs Table -->
        <h3 style="margin-bottom:15px; margin-top:40px;">All Activity Logs</h3>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Rep</th>
                        <th>Lead</th>
                        <th>Result</th>
                        <th>Sales ($)</th>
                        <th>Notes</th>
                    </tr>
                </thead>
                <tbody id="adminLogsTable">
                    <!-- Skeleton Loader -->
                    <tr>
                        <td><div class="skeleton skeleton-text short"></div></td>
                        <td><div class="skeleton skeleton-text"></div></td>
                        <td><div class="skeleton skeleton-text"></div></td>
                        <td><div class="skeleton skeleton-text"></div></td>
                        <td><div class="skeleton skeleton-text short"></div></td>
                        <td><div class="skeleton skeleton-text"></div></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <button class="nav-item" id="navManagerChat">
            <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
            AI Manager
        </button>
        <button class="nav-item active" onclick="location.href='admin_dashboard.html'">
            <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
            Admin
        </button>
    </div>

    <!-- AI Manager Modal -->
    <div id="aiManagerModal" class="modal-overlay">
        <div class="modal-content" style="max-width: 600px;">
            <div class="modal-header">
                <h3 style="display:flex; align-items:center; gap:8px;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2"><path d="M12 2a2 2 0 0 1 2 2c0 1.1-.9 2-2 2a2 2 0 0 1-2-2c0-1.1.9-2 2-2z"/><path d="M19 14a2 2 0 0 1 2 2v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4a2 2 0 0 1 2-2h14z"/><path d="M12 14v-4"/></svg>
                    AI Manager
                </h3>
                <button class="close-btn" id="closeAiModal">&times;</button>
            </div>
            <div id="aiChatWindow" class="chat-window">
                <div class="chat-msg ai" dir="auto">Hello! I am your AI Sales Director. How can I assist you with team analytics today?</div>
            </div>
            <form id="aiChatForm" style="display:flex; gap:10px;">
                <input type="text" id="aiMessageInput" placeholder="Ask about top reps or team stats..." required style="flex:1;">
                <button type="submit" class="btn btn-primary" id="aiSendBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </form>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="app.js?v=9"></script>
</body>
</html>
